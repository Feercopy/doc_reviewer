name: Verify and deploy production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact main commit to verify and deploy
        required: false
        type: string
      pull_request_number:
        description: PR to reconcile after a token-driven merge
        required: false
        type: string
      reviewed_head_sha:
        description: Exact reviewed PR head expected before merge
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('gate-challenger-pr-{0}', github.event.pull_request.number) || 'gate-challenger-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve-release:
    name: Resolve exact release commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_sha: ${{ steps.release.outputs.release_sha }}
    steps:
      - name: Resolve direct or reconciled release SHA
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_SHA: ${{ github.sha }}
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
          INPUT_PR_NUMBER: ${{ inputs.pull_request_number }}
          INPUT_REVIEWED_HEAD_SHA: ${{ inputs.reviewed_head_sha }}
        run: |
          if [ -n "$INPUT_RELEASE_SHA" ]; then
            if ! printf '%s\n' "$INPUT_RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "release_sha must be a full commit SHA."
              exit 1
            fi
            echo "release_sha=$INPUT_RELEASE_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$INPUT_PR_NUMBER" ] || [ -n "$INPUT_REVIEWED_HEAD_SHA" ]; then
            if ! printf '%s\n' "$INPUT_PR_NUMBER" | grep -Eq '^[0-9]+$' || \
              ! printf '%s\n' "$INPUT_REVIEWED_HEAD_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "PR reconciliation requires a PR number and full reviewed head SHA."
              exit 1
            fi

            for _ in $(seq 1 60); do
              pr_json="$(
                gh pr view "$INPUT_PR_NUMBER" \
                  --repo "$GH_REPO" \
                  --json headRefOid,state,mergeCommit
              )"
              current_head_sha="$(printf '%s\n' "$pr_json" | jq -r '.headRefOid')"
              state="$(printf '%s\n' "$pr_json" | jq -r '.state')"

              if [ "$current_head_sha" != "$INPUT_REVIEWED_HEAD_SHA" ]; then
                echo "The pull request head changed before deployment reconciliation."
                exit 1
              fi

              if [ "$state" = "MERGED" ]; then
                merge_commit_sha="$(printf '%s\n' "$pr_json" | jq -r '.mergeCommit.oid')"
                if ! printf '%s\n' "$merge_commit_sha" | grep -Eq '^[0-9a-f]{40}$'; then
                  echo "GitHub did not return the merged commit SHA."
                  exit 1
                fi
                echo "release_sha=$merge_commit_sha" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              if [ "$state" = "CLOSED" ]; then
                echo "The pull request closed without merging."
                exit 1
              fi

              sleep 10
            done

            echo "The pull request did not merge within the reconciliation window."
            exit 1
          fi

          if ! printf '%s\n' "$EVENT_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "GitHub did not provide a full event SHA."
            exit 1
          fi
          echo "release_sha=$EVENT_SHA" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify release
    needs: resolve-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the exact release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve-release.outputs.release_sha }}

      - name: Validate deployment scripts
        run: |
          bash -n deploy/server/gate-challenger-deploy
          bash -n deploy/server/gate-challenger-deploy-entrypoint

      - name: Run API tests
        run: docker compose -f infra/docker-compose.test.yml run --rm api-test

      - name: Run worker tests
        run: docker compose -f infra/docker-compose.test.yml run --rm worker-test

      - name: Run web tests and production build
        run: |
          docker build --target builder --tag gate-challenger-web-ci --file apps/web/Dockerfile.prod apps/web
          docker run --rm \
            --env PRODUCTION_DEPLOY_REPO_ROOT=/workspace \
            --volume "$PWD:/workspace:ro" \
            gate-challenger-web-ci npm run test

      - name: Validate production Compose configuration
        env:
          APP_SECRET_KEY: ci-only-not-a-production-secret
          POSTGRES_PASSWORD: ci-only-not-a-production-secret
          PUBLIC_API_BASE_URL: https://example.invalid/doc-challanger/api
          NEXT_PUBLIC_API_BASE_URL: https://example.invalid/doc-challanger/api
          CORS_ALLOW_ORIGINS: https://example.invalid
          GATE_CHALLENGER_HOST_PATH: /tmp/gate-challenger
          DEVILS_ADVOCATE_HOST_PATH: /tmp/devils-advocate
          IC_AGENTIC_REVIEW_HOST_PATH: /tmp/ic-agentic-review
        run: docker compose -f infra/docker-compose.prod.yml config --quiet

  deploy:
    name: Deploy production
    needs:
      - resolve-release
      - verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://iseremenko.ru/doc-challanger/login
    steps:
      - name: Configure restricted production SSH access
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          install -d -m 700 "$RUNNER_TEMP/deploy-ssh"
          printf '%s\n' "$PROD_SSH_KEY" > "$RUNNER_TEMP/deploy-ssh/id_ed25519"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$RUNNER_TEMP/deploy-ssh/known_hosts"
          chmod 600 "$RUNNER_TEMP/deploy-ssh/id_ed25519" "$RUNNER_TEMP/deploy-ssh/known_hosts"

      - name: Deploy the verified commit
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          RELEASE_SHA: ${{ needs.resolve-release.outputs.release_sha }}
        run: |
          ssh \
            -i "$RUNNER_TEMP/deploy-ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$RUNNER_TEMP/deploy-ssh/known_hosts" \
            "gate-deploy@$PROD_HOST" \
            "deploy $RELEASE_SHA"
