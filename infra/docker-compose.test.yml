services:
  api-test:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        INSTALL_DEV: "true"
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,postgres,redis,api,worker,web}
    environment:
      APP_ENV: test
      APP_SECRET_KEY: test-secret-key-for-local-pytest-only
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_ROOT: /tmp/gate-challenger-test-storage
      HERMES_ENABLED: "false"
    command: ["python", "-m", "pytest", "apps/api/tests", "-q"]

  worker-test:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
      args:
        INSTALL_DEV: "true"
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,postgres,redis,api,worker,web}
    environment:
      APP_ENV: test
      APP_SECRET_KEY: test-secret-key-for-local-pytest-only
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_ROOT: /tmp/gate-challenger-test-storage
      HERMES_ENABLED: "false"
    command: ["python", "-m", "pytest", "tests", "-q"]
