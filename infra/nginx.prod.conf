upstream gate_api {
  server api:8000;
}

upstream gate_web {
  server web:3000;
}

server {
  listen 80;
  server_name iseremenko.ru www.iseremenko.ru;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
  }

  location / {
    return 308 https://iseremenko.ru$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.iseremenko.ru;

  ssl_certificate /etc/letsencrypt/live/iseremenko.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/iseremenko.ru/privkey.pem;

  return 308 https://iseremenko.ru$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name iseremenko.ru;

  ssl_certificate /etc/letsencrypt/live/iseremenko.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/iseremenko.ru/privkey.pem;

  client_max_body_size 50m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = / {
    return 308 /doc-challanger/login;
  }

  location = /doc-challanger {
    return 308 /doc-challanger/login;
  }

  location = /doc-challanger/api {
    return 308 /doc-challanger/api/;
  }

  location /doc-challanger/api/ {
    proxy_pass http://gate_api/;
  }

  location /doc-challanger/ {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://gate_web;
  }
}

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 50m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = /api {
    return 308 /api/;
  }

  location /api/ {
    proxy_pass http://gate_api/;
  }

  location / {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://gate_web;
  }
}
